<!DOCTYPE html>
<html lang="en" class="theme-manhattan">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flowthrough v0.0.3</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <link href="/shared.css?v=0.0.3" rel="stylesheet" />
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div class="header-body">
        <h1>Flowthrough</h1>
        <div class="subtitle">v0.0.3</div>
      </div>
    </header>

    <div id="orgSection" class="auth-section">
      <label class="form-label" for="org">ORG:</label>
      <div class="auth-row">
        <input type="text" id="org" class="form-control" placeholder="Enter ORG" maxlength="20" />
        <button id="authBtn" class="btn btn-success px-4" type="button">Authenticate</button>
      </div>
      <small class="text-muted">Press Enter to authenticate</small>
    </div>

    <div class="app-status" id="status">Enter ORG and press Enter to authenticate</div>

    <div id="mainUI" style="display: none;">
      <div class="asn-bar">
        <div class="field">
          <label class="form-label" for="asnInput">ASN</label>
          <div class="input-group">
            <input type="text" class="form-control" id="asnInput" placeholder="FLOW001" />
            <button class="btn btn-primary" id="loadBtn" type="button"><i class="fa-solid fa-magnifying-glass"></i> Load</button>
          </div>
        </div>
        <div class="meta hidden" id="asnMeta"></div>
        <div class="asn-view-picker">
          <label class="form-label" for="viewSelect">View</label>
          <select class="form-select form-select-sm" id="viewSelect">
            <option value="1">1 — Stacked lines</option>
            <option value="2">2 — Main / detail</option>
          </select>
        </div>
      </div>

      <div id="previewWrapper" class="hidden stacked-active">
        <div id="stackedView" class="lines-stack lines-stack-view">
          <div id="linesContainer"></div>
        </div>
        <div id="mainDetailView" class="main-detail main-detail-view hidden">
          <nav class="line-nav">
            <div class="form-label mb-2" id="lineNavHeading">ASN lines</div>
            <div id="lineNav"></div>
          </nav>
          <div class="detail-pane" id="detailPane"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="footer-actions hidden" id="footerActions">
    <div class="summary-text" id="footerSummary">Load ASN to preview allocations</div>
    <button class="btn btn-success btn-lg" id="createBtn" disabled type="button"><i class="fa-solid fa-file-circle-plus"></i> Create Orders</button>
  </div>

  <div id="modalsHost"></div>

  <script src="/shared-ui.js?v=0.0.3"></script>
  <script src="/algo-explainer.js?v=0.0.3"></script>
  <script src="/app.js?v=0.0.3"></script>
</body>
</html>
